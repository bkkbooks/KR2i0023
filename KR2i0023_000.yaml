body:
  text: 越史略載記𩔖附録提要臣等謹案越史略三卷不著撰人名氏紀安南國事上卷曰國初沿革為趙佗以下諸王曰歴代守任為西漢至石晉交州牧守姓名曰吳紀乃五代末吳權及其子昌岌昌文等事蹟曰十二使君乃昌文没後諸將杜景碩等争立事蹟曰丁紀則丁部領以下諸王曰黎紀則黎桓以下諸王中卷下卷皆曰阮紀則自李公藴得國後諸王事蹟紀述特詳惟以李為阮與史不合案黎崱安南志略稱陳氏代立凡李氏宗族及齊民姓李者皆令更為阮以絶民望則此書當為陳氏之臣所作崱志又載陳普嘗作越志黎休嘗修越志俱陳太王時人太王者陳日煚之諡則此書或即出普休二人手未可知也安南自漢迄唐並為州郡五季末為土豪竊據宋初始自立國此書自唐以前大抵全襲史文自丁部領以下則出其國人之詞與史所載殊有同異葢史臣但承赴告之辭故如薨卒之𩔖往往較差一年至名號官爵或祇自行國中而不以通于大朝故亦有所錯互其牴牾之處頗可與正史相參證又史稱陳日尊自帝其國尊公藴為太祖神武皇帝國號大越此書原題大越史略葢舉國號為名而所列公藴至昊旵八王皆僭帝號不獨陳日尊一代則尤史所未詳又玉海記交趾天貺寳象神武彰聖嘉慶諸年號此書皆與相合特所列黎阮諸王無不改元者而史家並未悉載則必當時深自諱之故中國不能盡知耳書末又載陳日煚以下紀年一篇但録所僭諡號改元而不具事蹟其中所稱太王者以史按之當為陳叔明其稱今王者當為陳煒而史載日煚至煒十二世此書乃僅得十世未詳其故又考㢘州府志紀康熈十三年海濵得鐘題皇越昌符九年乙丑説者疑為宋時李乾徳以後僭號今此書稱今王昌符元年丁已當明洪武十二年其九年正值乙丑則為陳煒僭號無疑是亦足資考證矣安南自宋以後世共職貢乃敢乗前代失馭之際輒竊號國中至著之簡䇿以妄自誇大實悖謬不足採然吳楚僭王春秋絶之而作傳者亦不没其實故特依偽史例録之以著其罪且以補宋元二史外國傳之所未備焉乾隆四十五年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
