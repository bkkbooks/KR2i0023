body:
  text: 越史畧卷上國初沿革昔黄帝既建萬國以交趾逺在百粤之表莫能統屬遂界於西南隅其部落十有五焉曰交趾越裳氏武寧軍寧嘉寧寧海陸海湯泉新昌平文文郎九真日南懐驤九德皆禹貢之所不及至周成王時越裳氏始獻白雉春秋謂之闕地戴記謂之雕題至周莊王時嘉寧部有異人焉能以幻術服諸部落自稱碓王都於文郎號文郎國以淳質爲俗結繩爲政傳十八世皆稱碓王越勾踐嘗遣使来諭碓王拒之周末爲蜀王子泮所逐而代之泮築城於越裳號安陽王竟不與周通秦末趙佗據欝林南海象郡以稱王都番禺國號越自稱武皇時安陽王有神人曰臯魯能造栁弩一張十放教軍萬人武皇知之乃遣其子始為質請通好焉後王遇臯魯稍薄臯魯去之王女媚珠又與始私焉始誘媚珠求看神弩因毁其機馳使報武皇武皇復興兵攻之軍至王又如初弩折衆皆潰散武皇遂破之王銜生犀入水水為之開國遂屬趙趙紀武帝諱佗姓趙氏漢真定人秦始皇三十三年已併天下略定揚粤以任囂為南海尉佗為龍川令至二世時囂死以佗代囂秦滅佗并有桂林象郡之地自立為南越王漢髙祖既定天下遣陸賈奉璽綬往拜佗為南越王漢髙后五年王自即皇帝位發兵攻長沙招撫甌駱閩粤皆屬焉有地東西萬餘里御黄屋左纛漢文帝立復遣陸賈遺書問之賈至王慙謝請復為藩王長供貢職至漢武帝建元之年薨諡曰武帝在位十八年孫胡立是為文王文王諱胡武帝孫也漢武帝時嘗遣子嬰齊入侍後王薨諡曰文王子嬰齊立是為明王明王諱嬰齊文王子也初為太子入宿衛於漢在長安娶樛氏女生子興及文王薨至是即位立樛氏為后興為太子漢元鼎四年王薨諡曰明王子興立是為哀王哀王諱興明王子也初即位尊母樛氏為太后太后未嫁於明王時嘗與覇陵人安國少季通及即位漢遣少季来諭王入朝太后復與少季通遂勸王入朝其相吕嘉數諌止王王不聽太后恐嘉不從置酒欲誅嘉嘉知之隂與大臣謀作亂漢武帝聞嘉不聽乃使韓千秋等將兵二千人以攻嘉嘉乃與其弟及國人攻弑王及太后盡殺漢使者迎明王長子術陽王立之而諡曰哀王術陽王諱建德哀王庶兄也元鼎五年十一月其相吕嘉出兵撃韓千秋等盡殺之函封漢使節置境上元鼎六年漢以路博德為㐲波將軍出桂陽下湟水楊僕為樓船將軍出豫章下横浦以歸義侯二人為戈船下瀨將軍出零陵下離水馳義侯因巴蜀罪人發夜郎兵下牂柯江同㑹番禺以攻嘉嘉及王遁入海博德使人追之擒王及嘉時戈船下瀬兵及馳義侯兵未下而南越已平矣遂分其地為九郡南海蒼梧鬱林合浦交阯九真日南珠崖儋耳右趙自武帝至術陽王凡五主始丁已終庚午共七十四年而亡自漢武帝元封元年以後皆北人除授歴代守任石戴漢武帝時人周章漢昭帝時人魏朗子明漢宣帝時人蘇定漢光武帝時人馬援後漢光武建武十六年麊泠縣人徴側雒將之女也嫁為米鳶縣人詩索妻性甚雄勇所為不法太守蘇定繩之以法側怒乃與其妹貳起峰州兵攻䧟郡縣九真日南皆應之略定漢南外六十五城自立為王都麊泠十七年漢拜馬援為伏波將軍以擊之十八年援縁海而進隨山刋道千有餘里至浪泊上與側戰側不能支退保禁溪十九年側益困遂走為援所殺追擊其餘黨至居風降之乃立銅柱為極界分其地為封溪望海二縣援又築為繭城其圎如繭二十一年秋援還漢周敞順帝時為刺史張喬順帝永和三年象休蠻區憐反攻殺長吏以喬為刺史喬至慰諭並皆降散夏方桓帝延熹三年九真復反拜方為刺史冬十一月賊衆二萬餘人皆来降劉操桓帝時人周隅靈帝時人朱儁靈帝光和四年夏四月烏滸蠻為亂州人梁龍等因之以反有衆數萬人帝命儁擊破之以儁為刺史賈琮靈帝中平元年州人屯兵執刺史帝以琮為刺史琮至為撫輯之州境乃安百姓歌曰賈父来晚使我先反今見清平吏不敢飯琮在事三年拜為議郎阮進漢中平中為刺史士燮燮字彥威蒼梧廣信人父賜桓帝時為日南太守燮少逰學京師好左氏春秋為之註解又通尚書大義父喪闋舉茂才除巫令遷交趾太守謙恭下士漢避亂者多往依焉獻帝聞其賢賜璽書褒諭以為綏南中郎將領交趾太守如故建安末燮遣子廞質於吴又以珠貝犀象及香果之珍羙者遺孫權權嘉之封龍編侯弟三人壹䵋武並為郡長燮既學問優博又達於從政處大亂之世保全一郡二十餘年疆場無事民皆樂業威尊無上出入鳴鐘磬備威儀笳簫鼓吹車騎滿道常有數十妻妾乗輜軿當時貴重威震南蠻尉佗不足數也魏黄初七年王薨壽九十在治四十餘年孫權聞王死析合浦以北屬廣州吕岱為刺史合浦以南為交州戴良為刺史以陳時代王為太守王子徽等發兵共拒良後吕岱皆以計誅之傳首武昌戴良呉人吕岱呉人陸允呉人孫諝呉人鄧荀先是呉以孫諝貪暴為民患故使荀督察之荀至擅調孔雀三十頭送建業民憚逺不去與郡吏呉興殺諝及荀呉興霍弋馬融楊稷劉俊陶璜晉武帝泰始三年孫皓遣陶璜等攻楊稷不克遂襲董元營獲其寳物船載而歸以璜領州督璜又擊元殺之稷以其將王素代元璜又䧟其州因以璜為刺史後璜見徴為武昌督時呉王已降於晉晉詔璜復其本職封宛陵侯卒璜在州三十年恩威交著及卒舉州號哭如喪父母吾彥代璜為刺史顧秘代吾彥為刺史陶威璜子陶淑威弟陶綏淑子陶侃晉元帝大興元年十一月詔加侃廣州刺史都督交州諸軍事王諒晉元帝永昌元年以諒為刺史使收梁碩碩圍諒於龍編奪諒節諒不與乃斷右臂而取之諒死明帝太寧元年遣將軍髙寳攻碩斬之阮放晉成帝時為刺史阮敷穆帝時為刺史朱輔秦苻堅時為刺史阮遜杜瑗晉孝武帝太元五年九真太守阮遜據州叛六年杜瑗斬遜州境乃平杜惠度瑗子也義熈七年永嘉太守盧循來奔攻破合浦徑向州治晉帝以惠度為刺史惠度率府兵擊破之於石碕又與循戰於龍編南津惠度以雉尾炬燒其船夾岸射之循兵大潰循溺水死惠度取其屍斬之函首詣建康孝武帝初元元年七月林邑入冦惠度擊破之林邑乞降惠度為政民畏而愛之城門夜開道不拾遺杜宏文惠度子王徽代宏文為刺史檀和之宋文帝元嘉二十三年命刺史檀和之討林邑南陽人宗慤性好武事嘗言願隨長風破萬里浪及和之伐林邑毅然請行以慤為振武將軍林邑王范陽邁聞軍出上表請還所掠地和之進軍圍林邑將范㐲龍於區粟城宗慤擊破之五月拔區粟城斬伏龍乗勝入象浦陽邁傾國來戰以甲被象前後無際宗慤又為獅子形以拒之象果驚走林邑兵大敗陽邁遁去二十四年和之還北劉牧宋明帝時刺史劉勃阮長仁宋明帝時刺史沈煥齊髙帝時刺史阮叔獻叔獻長仁之從子長仁卒叔獻代領州事以號令未行求刺史於宋宋以沈煥為刺史以叔獻為武平新昌二郡太守叔獻既得朝命遂發兵守險不納煥煥停鬱林病卒齊髙帝建元元年以叔獻為刺史叔獻既受命乃斷絶貢獻永明三年命劉楷為刺史以討叔獻叔獻懼間道還朝劉楷齊髙帝時刺史房法宗齊明帝時刺史伏登之法宗長史也以法宗多病囚之别室而奪其權法宗好讀書在囚中求書觀之登之曰使君安居猶恐動疾豈可看書竟弗與齊以登之為刺史法宗還過嶺而卒阮凱齊明帝時刺史阮畟梁人凱叛畟斬之代為刺史侯諮梁武帝時刺史楊瞟初州人阮賁反據龍編城自稱南越帝置百官改元天德國號萬春梁武帝拜瞟為交州刺史陳霸先為司馬以擊賁賁率衆三萬拒之敗於朱鳶又敗於蘇歴江口賁奔嘉寧城瞟進軍圍之賁奔入新昌獠中又率衆二萬出屯典澈湖大造船艦充塞湖中是夜江水暴漲霸先率所部兵隨流先進諸軍鼓譟以從賁不為備因大潰退保屈獠洞病卒餘黨畏霸先兵勢乃舉衆就降賁子天寳入九真霸先舉兵討平之以九真為愛州陳霸先以討阮賁之功授兵威將軍交州刺史尋徴還北劉方隋文帝仁壽二年州帥阮佛子據越王城作亂兄子大權據龍編文帝以方為行軍總管以討佛子佛子懼請降焬帝大業中以林邑反帝改日南為驩州以方為驩州道行軍總管以討林邑方軍至闍梨江林邑兵皆騎巨象四面而至方乃多掘小坑草覆其上既戰偽北林邑逐之象多陷死因以鋭師繼之林邑大敗俘馘萬計方追之屢戰皆捷過馬援銅柱南八日至其國都林邑王梵志棄城遁方入城獲廟主十八皆鑄金為之方刻石紀功而還道病卒丘和唐髙祖武德五年授和大總管爵譚國公和復奏置都督府主劉延祐唐髙宗調露元年改交州刺史為安南都䕶府以延祐為都䕶舊俚户歳半租延祐責令全入衆始怨延祐誅其渠李嗣仙餘黨遂叛圍府城殺延祐曲覽中宗時為都䕶以貪暴失衆心為司録甘猛所殺張順肅宗時為都䕶張伯儀張順子肅宗至德二載改安南曰鎮南都䕶府以伯儀為都䕶代宗大厯二年張伯儀更築羅城三年復為安南都䕶府髙正平代宗時為都䕶趙昌代正平為都䕶德宗貞元七年昌奏置柔逺軍裴泰代昌為都䕶為府人王季元所殺以趙均為都䕶趙均李象古憲宗時為都䕶為府人楊清所殺阮元喜穆宗長慶二年以元喜為安南都䕶以城門有逆水恐州人多出反叛因卜今城時方築小城相者卜曰君力不足修大城五十年後必有髙人於此定都建府也至咸通中髙駢乃増築羅城韓約朗州武陵人本名重革文宗太和中廢州都督咸屬安南都䕶府以約為都䕶武渾武宗時人裴元祐武宗時人阮涿宣宗時為都䕶經畧使王式父起王楷之弟也擢進士第式巧於仕宦遷殿中侍御史大中中為晉州刺史徙安南都䕶李鄠宣宗大中十二年代王式為都䕶十二月土蠻引南詔兵襲本府陷之鄠奔武州二年鄠集土兵攻羣蠻復取府城懿宗責其失守貶儋州司户咸通中罷安南都䕶府置行交州於海門鎮尋復之王寛代鄠為都䕶蔡襲懿宗咸通中南詔率蠻來冦懿宗以湖南觀察使蔡襲代王寛仍發單滑徐汴荆襄潭鄂諸道兵以擊之蠻遂引去時嶺南節度使蔡京忌襲功成罷戍兵襲以蠻冦未定兵疲食盡作十必死狀申於中書省時相信京言終不省四年春正月南詔復率蠻兵五萬來攻復陷府城援兵不至襲左右皆徒步力戰身中十矢欲下船不及溺水而死荆南虞候元惟德謂其衆曰吾輩無船入水則死不若還向城與蠻人鬭以一身易二蠻亦為有利遂自東羅門入蠻不為備惟德縱兵擊之殺二千餘人明日蠻將楊思進出戰惟德死之蠻所殺虜凡五十萬人留兵二萬人懿宗召還諸道兵罷安南都䕶府置行交州於海門鎮以宋戎為交州刺史七月復置都䕶府咸通五年以容管經畧使張茵勾當安南軍府事茵逗留不進夏侯薦髙駢以代茵髙駢駢字千里崇文之孫也世在軍中折節讀書好談論古人少事朱叔明有二鵰並飛引弓祝之曰我且貴當中之一發而二鵰俱貫衆大驚號落鵰侍御以功遷秦州防禦使時南詔盡有交州地咸通五年駢以驍衛將軍為安南都䕶府經略招討使悉以張茵所將兵委之九月駢至南峯州蠻衆五萬方穫秋稲駢掩擊大破之遂進攻南詔又破之殺其將叚酋遷及土蠻兵斬首三萬餘級乃廢都䕶府置靜海軍以駢為節度使駢據本州稱王自羣蠻為冦殆十年至是乃安駢修築羅城周迴一千九百八十丈零五尺髙二丈六尺腳廣二丈六尺四面女牆髙五尺五寸敵樓五十五所門樓五所甕門六所水渠三所踏道三十四所又築隄子周迴二千一百二十五丈八尺髙一丈五尺腳濶三尺又造屋五千餘間髙駢以我州至邕廣海路多潛石覆舟漕運不通遂命長史林諷等疏鑿夏四月五日起役踰月之間將欲開達但中間値巨石綿亘者數丈堅硬如鉄刀下刃卷斧施柯折役者相顧殆㡬中止五月二十六日當書黒雲滃興怒風暴作俄而轟雷大發連震數聲儵爾開霽而巨石已破碎矣但餘兩處至六月二十一日復大震如初而巨石一時瓦裂事畢因命其處曰天威涇九年懿宗以駢為右金吾大將軍加撿挍尚書右僕射徙天平節度使尋卒髙鄩駢之從孫懿宗朝駢以鄩嘗為先鋒薦之代領我州曾衮僖宗時代髙鄩為節度使以撫字有聲州人呼曾尚書撰交州記一篇朱全昱全忠兄代衮為節度使獨孤損昭宗時為宰相哀帝授靜海節度使以代全昱州人號為嶽尚書曲顥梁開平元年代損為節度使曲全美顥弟也明宗時代顥為節度使後為南海將梁克真所執送南漢以阮進代之阮進後唐明宗長興元年南漢主劉龑遣其將劉克真來伐我州擒節度使曲全美以其將阮進代之楊廷藝愛州人唐明宗長興中廷藝發兵攻阮進進逃歸廷藝自稱節度使晉天福二年為矯公羨所殺矯公羨峯州人後晉髙祖天福二年春三月公羨殺廷藝而代之後為呉王所殺右歴代守任自西漢武帝元封元年辛未至石晉髙祖天福三年戊戌凡一千三十八年而呉始興或北人除授或本國自稱無慮百餘人見記者八十三人呉紀前呉王諱權姓呉氏先府之子也事楊廷藝為將軍後晉髙祖天福三年冬十二月權自愛州舉兵攻公羨公羨使人求救於南漢劉龑以其子萬王洪操為靜海軍節度使將兵救公羨洪操舟師自白藤江入欲攻權而權已殺公羨矣權聞洪操至於海口􅅗植鐡頭大杙及漲潮使以小舟挑戰而佯北洪操追之潮退杙露洪操拒戰不暇而潮落甚急舟盡礙於杙内權奪擊大破之溺死過半殺洪操權始稱王以晉出帝開運元年王薨在治凡七年楊平王諱主將姓楊氏前呉王家臣也呉王薨自立為王呉王子昌岌奔茶鄉范令公家主將以其弟昌文為已子昌文弟南興乾興皆幼乆之主將使人將兵至令公家索昌岌令公懼匿昌岌於洞中後漢隠帝乾祐三年主將遣昌文及楊杜二使將兵攻太平唐阮二村行至慈廉昌文謂二使曰我先王之德洽於民心不幸違棄羣臣主將自行不義罪莫大焉今又使我往伐無辜之邑幸而勝之彼終不服為之奈何二使曰惟命是聽遂反兵襲平王克之昌文以平王與已有恩乃降於張陽使食其邑平王在位七年後呉王南晉天策南晉諱昌文呉王權之第二子也以漢乾祐三年廢楊平王而自立稱南晉至周太祖廣順元年遣使迎其兄昌岌與之更相為政岌稱天䇿時有華閭洞人丁部領負谿山險固不修臣職二王欲討之部領懼遣其子璉入貢璉至二王責其不庭執璉而往征之踰月不克王乃懸璉竿上謂部領曰不降即殺之部領怒曰大丈夫豈以兒子之故累大事耶遽命十餘弓射璉二王驚異乃班師焉時天策擅作威福而南晉不復預政矣顯德元年天策薨南晉王遣使於漢劉鋹以王為靜海節度使宋太祖乾德三年王率師攻太平唐阮二村王舶上觀戰為伏弩所中而薨時十二使君並起各據州郡自治天策在位三年南晉十三年顯德周世宗年號右前呉王至後呉王凡三主始戊戌終乙丑共二十八年而亡十二使君矯三制名公桿據峯州阮太平名寛一名記據阮家陳公覽名日慶據唐林杜景公名景碩據杜洞阮逰奕名昌識據王槁阮郎公名珪據超𩔖阮令公名守捷據仙逰吕左公名獷據細江阮右公名超據扶列矯令公名順據洄湖范防遏名白虎據藤州陳明公名覽據江布口右十二使君始乙丑終丁卯凡三年而丁先王始併丁紀先王諸部領姓丁氏華閭洞人少孤與母媪五人居山神祠側門外有山荷叢葉上蝸跡成天子字王為兒時與羣童牧牛於山野皆推為衆兒長以君臣禮事之相與嬉戯則共交手為椅以捧王又取蘆花為前導以左右引象天子隊仗暇日羣兒相率摘柴以供役課晚歸其母母見之喜為烹豚以饗之鄉中父老皆相戒曰此兒器宇非常必能濟世安民我輩若不早附異日必悔其晚率子弟往從之居於汹澳柵其叔獨據柵不從王率衆攻之不勝奔至潭家灣橋壊䧟於濘叔欲刺之見二黄龍覆其上叔懼而退乃降時境内無主王聞陳明公賢而無嗣乃以其子往依焉明公一見為器重之養為已子盡付以所部兵使攻十二使君皆平之戊辰明公卒京府吏民多往歸之王以趙宋太祖開寳元年稱皇帝於華閭洞起宫殿制朝儀置百官立社稷尊號曰大勝明皇帝置大鼎於庭養虎於檻下令曰有犯法者受烹噬之罪人皆懾伏不敢違命己已二年閏五月封長子璉為南越王庚午三年改元曰太平元年宋封王為安南郡王立王后五人有年號自此始辛未太平二年置文武僧道階品以劉某為都䕶府太師阮匐為定國公黎桓為十道將軍宋聞王稱尊號使遺王書其畧曰中夏之於蠻貊猶人之有四肢也茍心腹未安四體庸能治乎蕞爾交州逺在天末唐季多難未遑區處今聖朝蓋覆萬國太平之業亦既成矣俟爾至止康乎帝躬爾母向隅為我小患俾我為絶蹯㫁節之計用屠爾國悔其焉追壬申太平三年封子璿為衛王立季子項郎為太子命阮子猷如宋修好甲戌太平五年王得讖曰杜釋弑丁丁黎家出聖明競頭多横死道路絶人行丙子太平七年已卯太平十年春越王璉使人殺太子項郎冬十一月王夜宴為福侯宏杜釋所弑及越王璉等先是釋為桐關吏夜卧橋上見流星入口釋以為休徴遂􅎯弑逆之心王既遇害釋潛入宫中匿於霤下踰三日渴甚以手盛雨水而食宫女見之告定國阮匐收斬之與其將軍黎桓奉衛王璿即皇帝位追尊王為先王母為太后王在位十一年壽五十五改元者一衛王諱璿先王次子也先王為杜釋所弑阮匐黎桓共奉衛王即皇帝位二年秋七月宋人伐我衆以璿幼弱共推黎桓為帝降璿為衛王右丁先王至衛王共二主始戊辰終庚辰凡十三年而亡黎紀大行王諱桓姓黎氏長州人也父覔母鄧氏初懐娠夢腹生蓮花俄而結實收之分與人食及寤莫識其故以天福元年七月十五日生王母見其手色異常語人曰此兒長成恐吾不及享其禄矣逾數年而父母俱亡本州有黎觀察者見而異之養為已子王遇冬寒覆舂而卧觀察視之見有黄龍覆其上由是益竒之及長事南越王璉先王嘉其勇智累遷至十道將軍殿前指揮使太平十年先王遇弑衛王尚幼王乃攝行國政稱為副王阮匐丁佃以王將不利於孺子乃相率起兵王出師攻之斬佃於陣執匐送京師殺之衛王二年宋太常博士侯仁寳請兵伐本國宋以仁寳為交州路轉運使領諸軍來攻時諒州聞兵至以狀聞太后命南栅人范巨備為大將軍率師拒之師出之日巨備直入省中謂王曰今主上幼弱未知我輩勤勞脫有尺寸之功其誰知之不如先策十道為天子然後出師軍士聞之咸呼萬歳太后見人情恱服使以龍衮加王躬請即位庚辰之年王即位封父為長興王母鄧氏為太后辛已天福元年春三月侯仁寳軍至浪山陳欽祚至西結劉澄至白藤王自將拒之植杙捍江宋兵退保寧江王令詐降以誘仁寳北軍敗擒斬之欽祚等聞軍敗引退上尊號為明乾應運神武昇平至仁廣孝皇帝壬午天福二年立五王后王遣徐穆等使占城為所執王怒自將討之斬其王篦眉税於陣俘馘不可勝數獲宫妓數百遷其重器收金銀寳貨以萬數滅其城池毁其宗廟是歳還京師大饑癸未天福三年初王征占城經銅鼓山至婆和以海路險阻艱於去來使開渠由是舟楫乃通甲申天福四年造百寳千歳殿於火雲山其柱裹以金銀東建風流殿西建榮華殿左建蓬萊殿右建極樂殿次構火雲樓連起長春殿其側起龍禄殿盖以銀瓦乙酉天福五年秋七月丁已王之誕辰也使造舟江中以竹作假山於舟上號南山遂設競渡禮丙戌天福六年宋授王靜海軍節度使丁亥天福七年王初耕藉田於隊山得金銀甕一耕於皤悔山得甕一名其地曰金銀田戊子天福八年巳丑天福九年管甲楊進禄以驩愛二州附占城王親征擒之復取二州封第三子為南封王庚寅興統元年春正月改元曰興統宋命左正言宋鎬來封王辛卯興統二年封弟之子為禦蠻王居峯州壬辰興統三年春王御乾元樓觀燈甲午興統五年封第十一子為行軍王居北岸吉覽州乙未應天元年正月改元命杜亨使於宋封義子為扶帶王居扶帶丙申應天二年王親征麻黄大發丹波之洞拔之丁酉應天三年秋七月王征杜洞江賊擒之大水戊戌應天四年已亥應天五年王親討何洞之十九州平之庚子應天六年討峯州賊鄭航擒之命劉紹如宋辛丑應天七年征莒隆賊賊見王張弩注矢欲射之矢尋墜再舉絃斷懼而退王御樓船入窮江追之賊陳於兩岸與王拒戰王兵䧟於江衛王璿中流矢死王呼天三聲賊自敗壬寅應天八年造銀兠鍪數千餘頂頒賜軍人癸卯應天九年王幸驩州鑿多盖港直至暗州甲辰應天十年王拽􅊻得巨蛇忽然逆流而去遣行軍王如宋乙巳應天十一年王薨於長春殿謂之大行王因為廟號在位二十七年壽六十五改元者三葬長州德陵中宗諱龍鉞大行第三子也母初侯姨女九歳封南封王大行初薨王與東城王中國王開明王爭立九閲月國中無主東城王敗奔占城為所殺元年正月王即位凡三日為開明王所弑號中宗壽二十五臥朝王諱龍廷大行第五子也中宗母弟興統三年封開明王篡中宗而自立丙午元年王即位尊號曰開天應運聖文神武則天崇道大勝明光孝皇帝王性好殺人有臨刑用茅纒以火燒之又使優人廖守心持鈍刀而解之以遲其死如此數日其人哀號痛切守心戯曰汝不慣受死王大笑以為樂凡征討所獲虜俘則押赴江岸潮退令人作水牢驅入其中潮漲則呵呷而亡又使登髙木從下伐之王又幸支寧江江多蛟乃繫人於舟側往來中流令蛟害之凡牲牢將供庖厨先使人牽入手刺殺之然後付庖人又削甘蔗於僧統郭卯頭上陽為失手傷卯頭流血王大笑或寅夜殺猫賜諸王食食畢以猫頭示之諸王皆嘔吐每視朝則使優人喋喋其口以亂執政之奏事又以守宫為膾以與人相爭而食諸王叛王討平之伐禦蠻王克之改峯州為太平府尊母氏為興國廣聖太后丁未二年定文武官制一遵於宋戊申三年正月改元景瑞元年王親征都良渭龍二州俘蠻人及馬數百匹使人以杖擊蠻囚痛甚蠻大呼誤犯大行諱王大笑再命擊之蠻人復呼屢犯王甚恱又討愛州俘其人作囤寘其中而笑之已酉景瑞二年秋七月王征驩唐何石等州冬十月辛亥王薨於寢殿號臥朝王王有痔疾臥以視朝年二十二即位在位四年年二十五改元者一右黎自大行至臥朝共三主始庚辰終己酉凡三十年而亡越史畧卷上
