body:
  text: 越史略卷中阮紀太祖諱藴姓阮氏北江古法人也母范氏以太平五年二月十七日生幼而聰睿器宇恢豁逰學於六祖寺僧萬行見而異之曰此非常人也强壯之後必能濟世安民為天下主及長慷慨有大志不事産業好涉獵經史應天中事中宗及中宗為臥朝所弒羣臣皆奔亡惟王獨抱尸而哭臥朝嘉其忠拜左親衛殿前指揮使王所居鄉中有木綿樹為雷所震其迹成文云樹根杳工木表青青禾刀木落十八子成震宫現日兊宫隱星六七日間天下太平萬行乃謂王曰臣近見讖文之異知黎當亡而阮當興也阮氏無若公之寬慈仁恕頗得衆心臣年七十有餘但以不及見盛治為恨耳王恐語泄使萬行匿於芭山景瑞二年臥朝薨嗣主幼沖王年三十六將隨龍軍五百人入宿衛時在內祇候陶甘沐揣知王有欲受禪之意遂以間微激之曰主上冥頑多行不義天厭其德弗克壽終嗣子沖幼未堪多難庶事煩擾百神靡依下民嗷嗷欲求其主親衛曷因此時逺追湯武之迹近鑒楊黎所行上順天心下從人望而猶守區區之小節耶王雖內悅其言而疑有奸謀乃陽罵之曰公何為敢出是言吾必執以送官甘沐徐曰臣見天時人事如此故敢啓之今欲送官誠不辭死王曰吾安忍告公但恐語泄而併誅耳甘沐復謂王曰國人皆謂阮當代黎圖讖已見不可掩也轉禍為福今其時矣親衛尚何疑乎王曰吾觀公志與萬行不異誠如此言計將安出甘沐曰方今百姓疲弊民不堪命親衛若撫以恩德彼必翕然從之猶水之就下孰能禦之甘沐知事急恐變生乃語朝中卿士即日皆會於朝堂謀曰今者億兆異心上下離德人怨先王之苛虐不欲歸從嗣君咸有推戴親衛之志吾輩不因此時立親衛為天子倉猝有變得保其首領耶於是共扶王正殿立為天子百官皆呼萬歲元年冬十一月王即位大赦天下焚網羅獄具羣臣上尊號曰奉天至理應運自在聖明龍見睿文英武崇仁廣孝天下太平欽明光宅昭彰萬邦顯應符感威震蕃蠻睿謀神功聖治則天道政皇帝追尊考曰顯慶王母明德太后册王后六立長子瑪為太子餘皆侯爵王女十三人皆公主以長女安國公主嫁於陶甘沐封為義信侯王兄某為武威王弟為聖翊王陳鎬為相公吳丁為樞密使歸碩輔為太保鄧文孝為太傅裴車磊為左金吾談坦為左武衛杜間為右武衛初古法鄉應天寺犬生一白子背上黑毛成天子字至是王以甲戌生庚戌二年正月改元順天元年初王以華閭城湫隘乃遷都大羅城初遷時泊舟城下黃龍見於御舶因號升龍改華閭為長安府北江曰天德江古法曰天德府升龍京內起朝元殿左置集賢殿右置講武殿左啓飛龍門右啓丹鳳門正陽啓髙殿階曰龍墀墀內翼以回廊周匝四面乾元殿後置龍安龍瑞二殿左建日光殿右建月明殿後有翠華宫城之四面啓四門東曰祥符西曰廣福南曰大興北曰曜德又於城內起興天寺五鳳星樓城離方創勝嚴寺辛亥順天二年王親征愛州莒隆賊平之是歲又於城內起太清宫萬歲寺鎮福藏城外建四天王寺衣錦寺龍具聖壽寺又起含光殿於瀘東步占城國進獅子壬子順天三年建龍德宫於城外以居太子欲其周知民事十二月神人留跡於東南峯盤石上長廣三尺深一丈真臘國來貢王征演州癸丑順天四年御含光殿觀競渡冬十月王征渭龍州蠻克之甲寅順天五年命翊聖王討蠻將杜長惠於金華步克之斬首萬計俘獲士馬不可勝數籬州獻麒麟改應天府為南京真臘來貢丙辰順天七年大熟禾三十結直錢七十文賜境內三年租起天光天德二寺及塑四天帝像地震望諸名山度京師人千餘為僧道丁巳順天八年乾元殿震宋真宗封王為南平王戊午順天九年使阮清道如宋求三藏經得之庚申順天十一年命王子討占城克之初乾元殿震視朝於東殿今又震視朝於西殿辛酉順天十二年春二月戊子以王誕日為天成節築萬歲南山於廣福門外多作飛禽走獸之狀羅列其上壬戌順天十三年命翊聖王伐大光歷癸亥順天十四年改湖陽鎮為永安州甲子順天十五年命太子伐峯輪州開國伐都金州築升龍城乙丑順天十六年僧萬行化身真臘來貢詔立番寨於歡州南界丙寅順天十七年命太子討演州遣使如宋丁卯順天十八年命太子討七源州東征王討文州戊辰順天十九年春二月王不豫三月戊戌薨於龍安殿壽五十六廟號太祖葬天德府壽陵在位二十二年改元者一太宗諱德政名佛瑪太祖長子也母黎氏太祖即位封開天大王又立為太子順天十一年奉命平諸蠻賊有功太祖薨羣臣奉遺詔詣龍德宫請即位時翊聖武德諸王皆伏兵於廣福門外欲襲王王自祥符門入至乾元殿三府兵攻益急王命阮仁義擊之三府兵敗武德王為黎奉曉所殺是日王即位於柩前大赦改元以順天十九年為天成元年上尊號曰開天統運尊道貴德聖文廣武崇仁上善政理民安神符龍現體元御極億歲功髙應真寶歷通元至奧興隆大定聰明慈孝皇帝初王生於長安府府中民家牛無數自換其角占者曰丑生人為天子言訖不見至是王以丑年生開國王據長安府以叛王親征之開國王降詔免其罪五月神人現跡於萬歲寺以梁任文為太師吳尚丁為太傅陶處忠為太保阮道紀為樞密阮徹為左參知政事廖嘉真中書侍郎矯蓬為右參知政事何逺為諫議大夫歸文雷為左腹心阮仁義為右腹心置殿前禁軍十衛一曰廣聖二曰廣武三曰御龍四曰捧日五曰澄海每衛各分左右六月以王誕日為天聖節築萬歲山於龍墀有五峯中峯立長壽仙幀左右皆有白鶴山上為飛仙鳥獸之狀山腰又有神龍蟠繞開植旌旗懸金璧使伶兒在巖中弄笛吹笙歌舞為樂己已天成二年以諒州牧申紹泰尚平陽公主愛州但乃甲叛王親討擒之神人現跡於天勝寺龍現於乾元殿基王曰其殿已圮惟基獨存今龍現之意其龍勝之地乎乃增廣其規模而重修之改名曰天安殿殿左起宣德殿右起延福殿前曰龍墀東置文明殿西置廣武殿墀之左右對立鐘樓以登聞寃獄之事前安奉天殿上建正陽樓為掌漏刻之處後起長春殿上建龍閣其外築城曰龍城秋八月歡州獻麒麟二冬十月萬歲寺前雨白米成堆庚午天成三年起天慶殿後架鳳凰樓冬十月王幸烏路省斂命大僚班黎偓佺使於宋大熟辛未天成四年歡州叛王討平之造寺觀凡一百五十處壬申天成五年釋迦寺優曇樹開花四月王幸杜洞江耕籍是田獻九穗禾詔改其田曰應天癸酉天成六年春定源州叛王討平之九月彘源州叛王討之甲戌天成七年四月改元通瑞元年詔羣臣奏事於王者稱王曰朝廷秋九月幸仙逰山重先寺詔起重興殿古州法雲寺僧上言寺中放光數道隨光掘之得石函一函內有銀函銀函內有金函金函內有琉璃瓶瓶中有舍利乙亥通瑞二年天慶殿前生芝草封王子日中為承乾王起造西市及長廊建太和橋於蘇歷江愛州叛王親征克之王在愛州行宫宴羣臣密指定勝將阮慶曰此必反矣左右問其故曰此人瞻視異常動止失節見我有慙色是故知之其年慶果反丙子通瑞三年春三月以峯州牧黎順宗尚慶城公主四月置歡州行宫都金常新平原等州叛丁丑通瑞四年以開皇王為元帥討都金等州克之烏路桑園中古佛湧設競渡禮大水戊寅通瑞五年幸布海口耕籍田秋八月王御含光殿觀競渡九月神人現跡於天勝寺宋仁宗封王為南平王占城王子地婆刺等來朝己卯通瑞六年春正月廣源州首領儂存福叛稱昭聖皇帝封長子智聰為南衙王改其州曰長其國王親討之師渡冷浮津白魚入王舟至廣源州存福焚其部落而遁縱兵追之獲存福其子智髙脫身而走執存福歸京斬之夏五月廣源州獻生金一塊重一百十二兩六月改元為乾符有道元年冬十二月真臘國來貢遣使於宋庚辰乾符有道二年春正月朔日有食之辛巳乾符有道三年夏五月定宫女階品六月殿前指揮使丁祿馮律等謀叛事覺伏誅冬十一月以明威侯知乂安州儂智髙與其母阿儂自雷火洞復據儻猶州改其州曰大國王命討之生擒智髙王憐存福既被誅因原其罪畀以廣源雷火平婆思浪等州壬午乾符有道四年春三月王幸茄覽海口耕籍田地震交州叛冬十月改元明道元年詔中書省刪定律書十一月詔諸路各置亭候以便四方之觀認凡老弱及有大功已上犯罪者得贖銅鑄明道錢梁茂材使於宋癸未明道二年春四月愛州叛五月以開皇王為都統大元帥討愛州奉乾王為都統元帥討文州文州平夏四月王幸武寧州松山寺見其頽殿中有柱石欹壓上慨然有重修之意石柱忽然復正因命儒臣作賦以紀其異秋九月使魏徴如廣源州賜智髙郡王印仍拜太保詔造艦數百艘皆作龍鳳魚蛇虎鸚鵡之形冬十月長春殿御盾自動甲申眀道三年二月御盾復動癸卯親征占城以開皇王為留守甲申發自京師乙巳次大惡海口時波濤帖息大軍利涉自大安至姑山紫雲捧日至灣有片雲覆王舟隨其行止至思眀海口白魚入舟王聞占城王先列象陳於五滿江以待官軍遂詔軍士舍舟登陸王乃部分士卒建旗鳴鼓欲擊之賊見兵威甚盛遂先潰王追斬三首郭嘉懿斬其王仁斗以獻獲象三十頭生擒五千人餘為亂兵所殺者無數王為惻然下詔有殺占城人者斬秋七月大軍入佛誓城俘其宫女妻妾八月班師至長安府黃龍見於王舟九月王至自占城冬十月改元天感聖武元年大熟十二月置懷逺驛於嘉林以館四方客使太保儂智髙來朝乙酉天感聖武二年春三月立大內碑夏五月造太平車以黃金為飾丙戌天感聖武三年夏五月起銀漢宫於後苑以居占城宫人丁亥天感聖武四年置望國鎮及歸德保康宣化清平永通感化安民七驛各立碑候以為蠻夷歇宿之處占城來貢詔流其使於真登州以其王雍尼不恭故也戊子天感聖武五年儂智髙以勿惡洞叛命武威侯及太尉郭盛諡討之交戰之日天地晦冥俄而轟雷震於洞中其酋長支體磔裂舉洞驚駭遂降三月立社壇於長廣門外以為四時祈穀之處秋九月開瓊林勝景春光三園冬十二月詔定打春牛法范去了謀反事覺剮其肉於東西市己丑天感聖武六年春三月改元崇興大寶元年秋八月鑿御溝於鳳城外又開金鳴萬嵗池初鑿池時中鏗然有聲掘之得黃金一塊重五十兩因以名又築石山三峯於池上建舞鳳橋庚寅崇興大寶二年置决旱大發文湘洞於宋景西平州界儂智髙據宋界安德州勿陽洞以其洞為南天國改元景瑞愛州五縣江龍池甲叛辛卯崇興大寶三年開瑞清沼應明池於勝景園置內外隨龍軍命左驍衛將軍陳稔將五縣人鑿個凜港壬辰崇興大寶四年智髙請附於宋宋不納乃冦於宋五月智髙攻破宋橫山寨遂陷雍州以其州為大南國自稱仁惠皇帝癸巳崇興大寶五年宋伐智髙使梁珠來乞師詔以殿前指揮使武珥為招討使以援之是月宋狄青敗智髙於歸仁智髙奔大但國三月鑄鐘置龍墀令民之有寃抑不達者聽撞其鐘以聞宋石鑑從特磨道襲智髙母阿儂阿儂年已六十餘矣大但人函智髙首獻於宋斬阿儂於都市由是諸儂遂滅甲午崇興大寶六年九月戊寅王不豫冬十月辛卯薨於長春殿夀五十四在位二十六年葬天德府夀陵聖宗諱日尊太宗第三子也母梅氏太宗夢月入后懷因有娠以順天十四年二月二十五日生於龍德宫天成元年立為太子及長通經傳曉音律尤長於武略太宗命征伐所向皆克太宗薨奉遺詔即位於柩前十月改元以崇興大寶六年為龍瑞太平元年尊母梅氏曰靈感太后上尊號曰法天應運崇仁至德英文睿武慶感龍祥孝道聖神皇帝詔焚網羅獄具出翠華宫女賜東宫文武臣僚爵各有差以裴嘉祐為文明殿大學士范彛為左威衛陳改為右威衛劉慶為左清道王行為右清道改神衛匡聖都為拱聖廣德都為忠武廣武都為昭武及增置左右龍翼都各一百人丙午葬太宗立后八人以阮道成為太師郭擎日為太尉建永夀殿乙未龍瑞太平二年修大內諸殿癸丑以王生日為乾興節占城來貢秋八月王御水晶殿觀競渡冬十月大寒王謂左右曰我居深宫之中御獸炭襲狐裘冷氣猶且如是况囹圄之中縲絏之苦曲直未分腹之不充形之不蓋一為寒風所逼豈不死於無辜我甚憫之其令有司發府庫衾席賜之仍日給二飯賜天下今年稅錢之半造東林寺及東究山靜慮寺宋仁宗封王為郡王遣使於宋丙申龍瑞太平三年設羅漢㑹於天安殿秋八月真臘來貢造崇慶報天寺發府銅一萬二千斤鑄鐘留於其寺王為親製銘文冬十月己酉下勸農詔改大首領為刺史丁酉龍瑞太平四年春三月起大勝資天寶塔於崇慶報天寺髙數十丈其制為三十層夏四月王使員外郎梅元清以麒麟二遺於宋甲午黃龍自瓊林園見於長春殿前安州道叛冬十月王幸道大旁海口黃龍見於金鳳舟因改為祥龍十二月起天福天夀二寺以黃金鑄梵王帝釋像以安置占城來貢戊戌龍瑞太平五年起壺天八角殿於金鳴池三月闢祥符門起樓其上夏五月黃龍自龍德宫見於永壽殿六月起靈光殿左立建禮殿右立崇儀殿殿前搆獨柱六角蓮花鐘樓秋九月王幸波路海口因幸塗巧築塔處己亥龍瑞太平六年春三月王搜於諒州南平江因幸駙馬申景元第造崇嚴報德寺於武寧州夏六月黃龍見於永壽殿癸未改元以龍瑞太平六年為彰聖嘉慶元年秋八月丁丑御水晶殿視賜羣臣戴幞頭著靴自此始丙戌黃龍見於長春殿賜塗山塔號曰祥龍塔選京師諸色人男為黃男造延興土恆門占城來貢庚子彰聖嘉慶二年禁御船火拱聖火隨龍火及內庖人出入御階不得與在內小祗候相語及通信物往來違者死罪遇赦不原二月壬申王幸西源州捕象獲白象三夏六月諒州牧申紹泰以兵入宋界西平州如嶅縣捕本州逃亡人虜其指使楊侣才及男女牛馬不可勝數宋遣吏部侍郎余靖赴雍州議其事王命裴嘉祐等赴雍㑹議靖厚賂嘉祐及附書乞還侣才王不省秋八月王幸交海口黃龍見於延春舶因改交海曰天符海口王親翻占城樂曲及節鼓音使樂工歌之冬十月造行宫於窰潭以觀魚占城來貢渭龍州獻白象辛丑彰聖嘉慶三年羅順州獻白象沙蕩洞叛王親征克之愛州五縣江叛祈嗣於芭山黃龍見於壇內壬寅彰聖嘉慶四年嘉林郡進六眸三足龜秋九月使人採金於武健洞採銀於下連縣癸卯彰聖嘉慶五年夏六月起洞仙宫於大內之東獻白龜王命起寺於芭山以為祈嗣之處獲其珠以獻冬十二月起銀河門朝賀日指使唱聖躬萬福軍士應聲唱喏占城來貢甲辰彰聖嘉慶六年春二月日有重光夏五月造布海口行宫冬十月麻沙洞叛王討克之黃龍見於清瀾舶宋英宗加王同平章事乙巳彰聖嘉慶七年春二月觀魚於扶龍潭丙午幸布海行宫耕籍田夏六月王御天慶殿聽訟時王女洞仙宫主侍側王顧公主謂獄吏曰吾之愛吾子亦猶天下父母之愛其子也百姓無知自冒典憲吾甚憫焉應自今罪無輕重一從寬宥秋七月忙貫州叛王討降之八月開上林園丙辰黃龍自大眀殿見於㑹元殿又見於布海行宫癸未幸究瀾行宫號其宫曰景興窑潭行宫曰玩春宫冬十二月黃龍見於曜靈殿又見於逰蟾閣猗蘭元妃所居占城來貢白犀一丙午彰聖嘉慶八年春二月改元為龍彰天嗣元年三月黃龍見於太子宫中甲申都曹陶池獻白雀九月蠲檳榔稅甲子王使郎將郭滿築塔於仙逰山冬十一月幸啓瑞行宫省斂平陽公主男申道元尚天成公主丁未龍彰天嗣二年以貟外郎魏仲和鄧世資為都護士師書家十人為按獄吏賜仲和世資每月俸錢各五十貫禾各二百結并鹽魚等書家各二十貫禾一百結以止其受賂之心夏六月辛亥黃龍見於位仁行宫辛卯王幸位仁省斂及觀競渡戊申天貺寶象元年春正月真登州獻白象二几郎州獻白象一黃龍見於曜靈殿二月都臘縣獻白象及白雀黃龍見於啓瑞行宫夏五月又見於會仙殿修戰艦秋八月龍舟無故自動離本處三尺九月黃龍見於永春清瀾二舶宋神宗封王為南平王加開府儀同三司遣使如宋己酉神武元年春二月戊戌詔親征占城國丁未盟於龍墀庚寅發駕丁巳至乂安州黃龍見於金鳳舟庚申次南界海口黃龍又見於金鳳州乙丑使大僚班黃揵等攻日麗海口克之己巳度大長沙庚午次思容海口三月癸酉夜龍見於景勝舶丙午次尸唎皮奈海口有二鳥並飛隨王舟如導從之狀大軍前進次須毛江岸見其將布皮陀囉等陳於江岸官軍縱擊斬布皮陀囉占城死者不勝數其主第矩聞軍敗乃攜妻子夜遁是夜引軍傅佛誓城至同羅津佛誓人降夏五月元帥阮常傑俘獲第矩於真臘界夏五月王宴羣臣於占城王殿又親舞盾擊毬於其階王命遍數佛誓城內外人家凡二千五百六十餘區並焚之是月班師癸巳次思眀海口是夜黃龍見於御舶六月己巳渡海黃龍見於金鳳舟戊申渡布政海口大小磊磊山龍舟觸石而破辛酉王至自占城次朝東津詔有司肅軍容盛陳儀衛上御寶車羣臣皆騎馬導引占城王第矩戴麻骨冠著白㲲衣以絹繫腰令興武都五人牽之繫其黨屬以從秋七月奏捷於太廟丙辰黃龍見於寶車冬十一月丁丑赤羽夾日真臘來貢庚戌神武二年夏三月造紫宸殿五月黃龍見於長春宫龍光殿秋七月乙卯黃龍見於位仁宫九月造東南二天王寺辛亥神武三年春正月御書佛字長丈有六自春至夏不雨定贖杖刑銅數冬十二月王不豫詔有司誤入官職都左右廂者杖八十壬子神武四年春正月庚寅王疾亟薨於㑹仙殿壽五十廟號聖宗在位十九年改元者五葬天德府壽陵仁宗諱乾德聖宗長子也母猗蘭元妃黎氏以龍彰天嗣元年正月生王於洞仙宫即日立為太子王為人日角龍顔手垂過膝尤通音律凡樂工所習歌曲皆王所親製以神武四年春正月即位於柩前尊母猗蘭元妃為太妃上尊號曰憲天體道聖文神武崇仁懿義純誠眀孝皇帝以上陽太后同聽政夏四月八日行浴佛禮王御天安殿視朝是日以大僚阮常傑為檢校太尉阮日成為兵部侍郎以下各有差赦都護府囚諒州牧楊景通獻白鹿群臣上表稱賀拜楊景通為太保真臘來貢秋七月黃龍見於永壽殿葬聖宗羣臣上中元節賀表王幸窑潭行宫蠲占城白㲲賦迎法雲佛赴京師祈晴祀傘圓山閣使魏徴以年老致仕詔賜几杖詔遴選諸曾有投獻詩及僧官之識文字者𨽻為書家以補其職之缺徙捧日坊於南市王御天安殿羣臣上賀立表造長廣門太平門上水河門迎秋祠歸仁驛凡五處以王生日為夀天節立后二人癸丑二年正月改元曰太寧元年尊太妃為太后靈仁太后性嫉妬以嫡母而不得預政因謂王曰老母劬勞以有今日及富貴而他人是居將置老母於何地乎王雖冲幼頗知非上陽太后子乃幽上陽太后及其侍女七十二人於上陽宫逼令殉聖宗葬占城國來貢秋七月黃龍現於逰蟾閣八月峯州獻白鹿宋神宗封王為郡王甲戌太寧二年拱聖都火頭江曳家火延燒大興門夏四月重修大興門黃龍見白雀效質於禁庭秋九月黃龍見宋王安石秉政有獻言者謂我國已為占城所破餘衆不滿萬人可計日以取於是以沈起劉彛知桂州起彛乃集溪洞土丁為保甲又於海濵造舟艦教水戰禁州縣不與我邊貿易王知之乃先發諸道兵十萬人分為二道使阮常傑領水軍出永安攻欽亷宗亶領陸軍出永平攻雍州我師所向無前常傑攻陷欽廉二州復與宗亶㑹圍雍宋廣西監張守節率兵救之至崑崙關常傑迎戰大破之斬守節知州蘇緘以城固守我為飛梯以臨城彼施以火炬飛梯不能近又以毒矢射之城上人馬死者相枕彼以神臂弓發我之象軍多有殪者城髙而堅攻之四十餘日不能下獲宋人教以土囊傅城而登常傑從之城遂陷蘇緘奔還州𪠘先殺其家屬三十六人後乃縱火自焚軍士求緘不得乃盡殺吏民五萬餘人是役也所殺獲雍欽廉三州人無慮十萬乙卯太寧三年春正月奏捷占城來貢丙辰太寧四年春三月王觀扞水城黃龍見於王舟青龜負圖以見秋七月宋以廣南宣撫使郭逵趙髙為招討使總九將軍來伐我國王命阮常傑領水軍拒之昭文宏真二侯皆溺死如月江兩軍相持月餘常傑知宋軍力困夜渡江襲擊大破之宋兵死者十五六遂退取廣源州冬十月改元為英武昭勝元年十二月以內給事黎文盛為兵部侍郎丁巳英武昭勝二年夏五月設仁王㑹於天安殿秋九月築隄於如月江長六萬七千三百八十步冬十月幸苻仁省斂遂幸龍水海口龍見於王舟占城來貢戊午英武昭勝二年閏正月修大羅城二月朔詔罷秋筵宴禮使員外郎陶宗元領馴象五遺於宋請還廣源蘇茂等州宋人徴還所掠三州民兵大水入城內己未英武昭勝四年諒州獻白象雨雹五月大熟天成公主獻六眸三足龜冬十月黃龍自常春園見於其宫庚申英武昭勝五年春三月王幸窮江觀魚夏四月己亥神龜負閣五月唐人林瓊獻紫芝秋八月甘露降王御靈光殿觀競渡閏月設秋筵宴禮王幸苻仁省斂辛酉英武昭勝六年冬十一月日有重光占城來貢王還三州人丁於宋宋亦以廣源等州還於我使員外郎梁用律如宋請大藏經壬戌英武昭勝七年春二月降欽聖公主於渭龍州牧何彛慶冬十二月祇候宏阮波斯謀反伏誅占城來貢癸亥英武昭勝八年春二月王御天慶殿閲定京城黃男為三等三月選美女為萬延宫女夏五月黃龍飛自紫宸殿見於㑹仙殿五月造洞仁宫六月御車火秋九月麻沙洞叛冬十月親討克之觀競渡占城來貢甲子英武昭勝九年夏六月使兵部郎中黎文盛如永平寨議疆界事宋以文盛為龍圖閣待制冬十一月詔國中造瓦屋占城來貢乙丑英武昭勝十年春二月丁亥改元廣祐元年秋八月以黎文盛為太師占城來貢丙寅廣祐二年春正月阮逺獻六眸龜胸有圖書二月真臘來貢有婆羅門二人冬十一月起大覽山寺競渡占城來貢丁卯廣祐三年夏五月起造祕書閣冬十月幸覽山夜宴羣臣於山上王製覽山夜宴詩二首留題宋哲宗加王同平章事占城來貢戊辰廣祐四年秋九月戊申置十大書家冬十月築覽山塔十二月景靈宫成占城來貢己巳廣祐五年二月造冷涇徑宋兵入石犀州占城來貢庚午廣祐六年春二月合歡宫成宋哲宗封王為南平王遣使如宋辛未廣祐七年春二月王幸諒州觀捕象見官黎全義獻五色龜黎文盛獻白象一占城來貢競渡壬申廣祐八年夏五月造啓瑞行宫大熟十二月改元㑹豐元年癸酉㑹豐二年冬十月朔日有食之優曇樹開花甲戌㑹豐三年秋九月覽山寺成賜名景隆同慶寺王書篆額占城來貢遣員外郎阮利用如宋乙亥㑹豐四年夏五月詔諸侯子入朝六月聖極后薨真臘占城來貢丙子㑹豐五年冬十一月王觀魚於窑潭時王御小舟侍衛甚少太師黎文盛久蓄姦謀因以幻術起大煙霧潭中晝冥俄而王聞櫓聲稍近意其有變以戈摐之煙霧隨戈而斂見文盛舟已迫果有篡具使人擒之詔流文盛於梁江頭初文盛家有大理奴善為幻術文盛師事之至是乃反丁丑㑹豐六年秋八月白日星見赦都護府囚人冬十一月禁百姓造瓦屋大舟占城來貢競渡戊寅㑹豐七年秋八月地震彗見起陸地鼇山設競渡禮九月造崇淵殿於芳蓮池左置暉陽殿來鳳亭右立映蟾殿遏雲亭前起長鳴樓後跨玩花橋遣貟外郎阮文信如宋乞三藏經占城來貢己卯㑹豐八年捧日都獻六眸龜秋九月起安老山寺冬十月禁京城婦女不得效宫粧占城來貢庚辰㑹豐九年夏四月造仙逰山永福寺秋七月以矯文思為上林國士師十二月大疫辛巳龍符元化元年春正月改元二月王觀魚於窮江遂幸應豐省耕夏六月王幸苻仁省種秋七月賜百官秋衣設宴禮造開元觀九月王觀魚於窮江黃龍見於翔龍舸冬十一月慶雲見王御象栅觀捕象黃龍見十二月改歡州為乂安府造起延祐寺壬午龍符元化二年春二月王幸應豐行宫省耕冬十二月立春瑞雪降造開元太陽北帝三觀造瑞雲車大水占城來貢遣員外杜英厚使於宋癸未龍符元化三年春正月詔京城內外皆築堤捍水二月太后發府錢贖諸貧家女之典命者嫁與鰥夫秋八月置龍翔都冬十月元鹿來競渡甲申龍符元化四年春三月閲左右興武勇健兵為玉階都御龍兵為興聖廣武都百姓之大族者為武勝兵改田兒為鐡林兵秋九月朔延成侯以笏擊忠義侯於天安殿占城來貢競渡乙酉龍符元化五年春正月菖蒲生花二月祠髙禖夏六月太尉阮常傑卒秋九月築延祐寺白瓷塔二築覽山石塔三冬十月東梁州湧生金十一月朔日食過半占城來貢大疫丙戌龍符元化六年春三月王幸塗山夏五月彗星見秋七月造銀羅城十一月王將有事於宋造永隆二腹舶及造戰船員外郎魏文相使於宋占城來貢天成公主獻白象二丁亥龍符元化七年夏六月王幸章山黃龍見冬十月地震十二月造都護府戊子龍符元化八年春正月築章山塔築堤於機舍港昭聖后薨占城來貢己丑龍符元化九年夏四月王聽逆黨蘇厚杞崇訟厚崇皆上木馬冬十二月造洞靈臺庚寅㑹祥大慶元年春正月設廣昭燈㑹於大興門外三月婦人黃氏獻鳳雛毛羽具五色九苞是月參政徐文通獻白虎白馬生距檳榔一本生十二株獻白雀秋八月占城國獻異象所居有神光見遣員外郎陶彥使宋辛卯㑹祥大慶二年夏四月清化府獻檳榔一本生九株獻白龜白雀至禁庭日重輪大熟留守張延福獻白雀冬十一月日重輪占城來貢壬辰會祥大慶三年春正月甘露降二月清化人言海邊有異兒年方三歲解言語自稱皇帝的子號曰覺皇凡王所動止無不先知王命中使往問之所言皆驗乃迎以歸居於報天寺王以其靈異愛之愈隆時王無嗣欲立為太子羣臣不可乃止遂設齊會於禁中欲令覺皇投入為已子有佛跡山僧徐路道行者聞之而不恱乃使其姊徐氏赴㑹密以數珠結印授之曰至㑹所則插在簷端勿令人知見徐氏如其言覺皇忽嬰熱病遂語人曰所見遍滿國界皆有鐡網羅罩無路得入託宫中王命大索乃獲徐氏所藏數珠遂收路繫於興聖廊欲置於大辟崇賢侯入朝路哀呌曰願賢侯拯救貧僧幸得脫則入為侯子以報其德侯許諾入見王百般營救謂覺皇實有神力而為路所詛解是路勝於覺皇明矣臣謂莫若賜路之託生也王原之覺皇疾亟囑曰我死後宜造浮圖於仙逰山而葬之夏四月獻芝草優曇花及白鴉秋九月黃龍見於永光殿冬十月黑龍見於宫中癸巳㑹祥大慶四年秋八月黃龍見於大明殿獻白鹿甲午㑹祥大慶五年春正月瑞雪降三月黃龍見於章山塔繞三匝獻白雀六眸龜冬十月以內常侍黎伯玉為大理寺造勝嚴寺置善法堂四面建千佛樓安千佛寶相競渡員外郎陶信厚齎象十頭使於宋乙未㑹祥大慶六年春二月進茄花結三果三月起類卿崇福寺成夏六月日重輪秋七月獻金龜丙申㑹祥大慶七年春正月設廣照燈於大興門外製木僧擊鐘夏四月獻檳榔珠六月僧道行化身神宗生冬十一月獻三足六眸龜占城來貢競渡丁酉㑹祥大慶八年春正月獻白鹿元鹿三月上幸章山黃龍見夏四月獻三足六眸龜胸有善帝二字司農州獻赤馬生距黃龍見於洞靈祈壽寶臺秋七月猗蘭太后薨諡曰符聖靈仁太后八月葬靈仁太后火葬太后殉者三人是夜龍見冬十一月立崇賢侯子陽焕為太子戊戌㑹祥大慶九年春二月真臘占城來貢冬十一月甘露降禁家奴不得身上刺龍員外郎阮伯慶賫象犀於宋己亥㑹祥大慶十年冬十月盟國人於龍墀下詔伐麻沙洞軍出之日黃龍隨舶而行成慶侯獻六眸龜胸有玉字王擊麻沙洞破之宋徽宗加王守司空庚子天符睿武元年春正月改元夏六月獻白雀秋九月黃龍見冬十月搆衆仙臺占城真臘來貢競渡辛丑天符睿武二年夏五月大水至大興門秋七月造仙逰山廣教寺競渡壬寅天符睿武三年春二月隊山崇善延齡寶塔成秋八月觀競渡新製銀纓引於鹵簿貟外郎丁慶安使宋癸卯天符睿武四年春正月誕聖節新製推輪舞亭秋八月設秋筵宴禮冬十月幸應豐行宫造飛橋過波刺江築通霄臺真臘來貢大熟甲辰天符睿武五年冬十月築鬱羅臺大旱禱之乃雨乙巳天符睿武六年夏四月瑞聖公主獻六眸龜胸有國土安寧四字六月王幸應豐黃龍見於行宫冬十一月黃龍見於洞靈宫以內常侍牟都俞為中相丙午天符睿武七年春正月禁春不得伐木二月王御天安殿觀諸王侯蹴毬於龍墀夏五月黃龍見於永光殿秋八月神龜見中有道定王閣延寧公主八字冬十一月使令書家嚴常徐延等使於宋至桂州見其經略司謂常延曰今年京東湖南等處並已調發兵馬拒大金國未審歸期在何日此間鋪馬斷絶在在更少請使領還禮物大金元帥等以是年執宋徽欽二帝北歸宋國大亂丁未天符慶壽元年冬十二月王薨於永光殿壽六十二在位五十六年廟號仁宗改元者八葬天德府越史略卷中
